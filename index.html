<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daay Store - Vista sua melhor versão</title>
<link rel="icon" href="imagens/logo.jpg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --rose:       #e8b4bc;
    --rose-deep:  #c98a93;
    --nude:       #f7e9e9;
    --nude-soft:  #fdf6f5;
    --cream:      #fffbfa;
    --ink:        #463a3c;
    --ink-soft:   #7c6a6d;
    --line:       #f0dcdc;
    --whats:      #25d366;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Jost', sans-serif;
    background: var(--cream);
    color: var(--ink);
    line-height: 1.6;
    font-weight: 300;
  }
  h1, h2, h3 { font-family: 'Cormorant Garamond', serif; font-weight: 500; }

  /* Header */
  header {
    background: linear-gradient(165deg, var(--nude-soft) 0%, var(--nude) 100%);
    text-align: center;
    padding: 54px 24px 50px;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: "";
    position: absolute; inset: 0;
    background-image: radial-gradient(circle at 18% 28%, rgba(232,180,188,0.22), transparent 42%),
                      radial-gradient(circle at 82% 72%, rgba(232,180,188,0.18), transparent 46%);
  }
  .header-inner { position: relative; z-index: 1; }
  .logo {
    width: 168px; height: 168px;
    border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 10px 36px rgba(201,138,147,0.30);
    border: 4px solid #fff;
    margin-bottom: 22px;
  }
  .slogan {
    font-size: clamp(14px, 2.5vw, 17px);
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 4px;
    font-weight: 400;
  }
  .divider { width: 56px; height: 1px; background: var(--rose); margin: 24px auto 0; }

  /* Sobre */
  .sobre { max-width: 640px; margin: 0 auto; text-align: center; padding: 52px 28px 8px; }
  .sobre p {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 23px;
    color: var(--ink-soft);
  }

  /* Catalogo */
  .catalogo { max-width: 1120px; margin: 0 auto; padding: 26px 24px 50px; }
  .categoria-titulo {
    font-size: clamp(28px, 5vw, 42px);
    color: var(--rose-deep);
    text-align: center;
    margin: 52px 0 6px;
  }
  .categoria-sub {
    text-align: center; font-size: 11px; letter-spacing: 4px;
    text-transform: uppercase; color: var(--rose); margin-bottom: 32px;
  }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(238px, 1fr)); gap: 28px; }

  .card {
    background: #fff; border-radius: 6px; overflow: hidden;
    box-shadow: 0 8px 28px rgba(201,138,147,0.12);
    transition: transform .35s ease, box-shadow .35s ease;
    display: flex; flex-direction: column;
    opacity: 0; transform: translateY(20px); animation: rise .55s ease forwards;
  }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }
  .card:hover { transform: translateY(-6px); box-shadow: 0 16px 44px rgba(201,138,147,0.26); }
  .card-img { aspect-ratio: 3/4; overflow: hidden; background: var(--nude); }
  .card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform .6s ease; }
  .card:hover .card-img img { transform: scale(1.06); }
  .card-body { padding: 19px 19px 21px; text-align: center; display: flex; flex-direction: column; flex: 1; }
  .card-nome { font-family: 'Cormorant Garamond', serif; font-size: 23px; margin-bottom: 5px; }
  .card-preco { font-size: 22px; color: var(--rose-deep); margin-bottom: 15px; letter-spacing: .5px; }
  .card-preco span { font-size: 13px; vertical-align: super; }

  .btn-whats {
    margin-top: auto; display: inline-flex; align-items: center; justify-content: center; gap: 9px;
    background: var(--whats); color: #fff; text-decoration: none;
    padding: 12px 16px; border-radius: 50px;
    font-family: 'Jost', sans-serif; font-size: 14px; font-weight: 500; letter-spacing: .3px;
    transition: background .25s ease, transform .15s ease;
  }
  .btn-whats:hover { background: #1eb955; }
  .btn-whats:active { transform: scale(.97); }
  .btn-whats svg { width: 17px; height: 17px; fill: #fff; }

  /* Footer */
  footer { background: linear-gradient(165deg, var(--nude) 0%, var(--rose) 240%); text-align: center; padding: 50px 24px 44px; margin-top: 36px; }
  footer .f-brand { font-family: 'Cormorant Garamond', serif; font-size: 36px; color: var(--rose-deep); font-weight: 600; }
  footer p { color: var(--ink-soft); font-size: 15px; margin-top: 5px; }
  footer a { color: var(--rose-deep); text-decoration: none; }
  footer .f-divider { width: 40px; height: 1px; background: var(--rose); margin: 16px auto; }

  /* Botao flutuante */
  .float-whats {
    position: fixed; bottom: 22px; right: 22px; width: 58px; height: 58px;
    background: var(--whats); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 20px rgba(37,211,102,0.45); z-index: 50; transition: transform .2s ease;
  }
  .float-whats:hover { transform: scale(1.08); }
  .float-whats svg { width: 30px; height: 30px; fill: #fff; }

  .loading { text-align: center; padding: 60px 20px; color: var(--ink-soft); font-style: italic; font-family: 'Cormorant Garamond', serif; font-size: 20px; }
</style>
</head>
<body>

  <header>
    <div class="header-inner">
      <img class="logo" src="imagens/logo.jpg" alt="Daay Store">
      <p class="slogan" id="loja-slogan"></p>
      <div class="divider"></div>
    </div>
  </header>

  <section class="sobre"><p id="loja-sobre"></p></section>

  <main class="catalogo" id="catalogo">
    <div class="loading">Carregando produtos...</div>
  </main>

  <footer>
    <div class="f-brand" id="f-nome"></div>
    <div class="f-divider"></div>
    <p id="f-insta"></p>
    <p id="f-endereco"></p>
  </footer>

  <a class="float-whats" id="float-whats" target="_blank" aria-label="WhatsApp">
    <svg viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163a11.867 11.867 0 01-1.587-5.945C.16 5.335 5.495 0 12.05 0a11.82 11.82 0 018.413 3.488 11.82 11.82 0 013.48 8.414c-.003 6.557-5.338 11.892-11.893 11.892a11.9 11.9 0 01-5.688-1.448L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884a9.86 9.86 0 001.51 5.26l-.999 3.648 3.978-1.607zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/></svg>
  </a>

<script>
const ORDEM_CATEGORIAS = ["Lingerie", "Babydoll", "Camisolas", "Sexy Shop"];
const svgWhats = '<svg viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163a11.867 11.867 0 01-1.587-5.945C.16 5.335 5.495 0 12.05 0a11.82 11.82 0 018.413 3.488 11.82 11.82 0 013.48 8.414c-.003 6.557-5.338 11.892-11.893 11.892a11.9 11.9 0 01-5.688-1.448L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884a9.86 9.86 0 001.51 5.26l-.999 3.648 3.978-1.607zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/></svg>';

async function carregar() {
  try {
    const [cfgRes, prodRes] = await Promise.all([
      fetch('dados/config.json?' + Date.now()),
      fetch('dados/produtos.json?' + Date.now())
    ]);
    const cfg = await cfgRes.json();
    const prodData = await prodRes.json();
    const produtos = prodData.produtos || [];

    // Infos da loja
    document.getElementById('loja-slogan').textContent = cfg.slogan || '';
    document.getElementById('loja-sobre').textContent = cfg.sobre || '';
    document.getElementById('f-nome').textContent = cfg.nome || '';
    document.getElementById('f-endereco').textContent = cfg.endereco || '';
    const insta = document.getElementById('f-insta');
    if (cfg.instagram) {
      const handle = cfg.instagram.replace(/^https?:\/\/(www\.)?instagram\.com\//,'@').replace(/[/?].*$/,'');
      insta.innerHTML = 'Instagram: <a href="' + cfg.instagram + '" target="_blank">' + handle + '</a>';
    }

    const wpp = (cfg.whatsapp || '').replace(/\D/g,'');
    document.getElementById('float-whats').href =
      'https://wa.me/' + wpp + '?text=' + encodeURIComponent('Olá! Vim pelo site da ' + (cfg.nome||'loja') + ' e gostaria de saber mais.');

    const catalogo = document.getElementById('catalogo');
    catalogo.innerHTML = '';

    const cats = [...new Set(produtos.map(p => p.categoria))].sort((a,b) => {
      const ia = ORDEM_CATEGORIAS.indexOf(a), ib = ORDEM_CATEGORIAS.indexOf(b);
      return (ia===-1?99:ia) - (ib===-1?99:ib);
    });

    if (produtos.length === 0) {
      catalogo.innerHTML = '<div class="loading">Em breve, novos produtos!</div>';
      return;
    }

    let delay = 0;
    cats.forEach(cat => {
      const t = document.createElement('h2'); t.className='categoria-titulo'; t.textContent=cat; catalogo.appendChild(t);
      const s = document.createElement('div'); s.className='categoria-sub'; s.textContent='Coleção'; catalogo.appendChild(s);
      const grid = document.createElement('div'); grid.className='grid';

      produtos.filter(p => p.categoria===cat).forEach(p => {
        const link = 'https://wa.me/' + wpp + '?text=' +
          encodeURIComponent('Olá! Tenho interesse no produto: ' + p.nome + ' (R$ ' + p.preco + '). Visto no site.');
        const card = document.createElement('div');
        card.className='card'; card.style.animationDelay = (delay += 0.05) + 's';
        card.innerHTML =
          '<div class="card-img"><img src="'+p.foto+'" alt="'+p.nome+'" loading="lazy"></div>' +
          '<div class="card-body">' +
            '<div class="card-nome">'+p.nome+'</div>' +
            '<div class="card-preco"><span>R$</span> '+p.preco+'</div>' +
            '<a class="btn-whats" target="_blank" href="'+link+'">'+svgWhats+' Comprar pelo WhatsApp</a>' +
          '</div>';
        grid.appendChild(card);
      });
      catalogo.appendChild(grid);
    });
  } catch (e) {
    document.getElementById('catalogo').innerHTML =
      '<div class="loading">Não foi possível carregar os produtos agora. Recarregue a página.</div>';
    console.error(e);
  }
}
carregar();
</script>

</body>
</html>
